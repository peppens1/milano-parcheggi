<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <title>Milano Parcheggi · Webapp ATM</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <style>
    :root {
      --bg: #e2e8f0;
      --card: rgba(255,255,255,0.96);
      --text: #0f172a;
      --muted: #475569;
      --blue: #2563eb;
      --blue-soft: #dbeafe;
      --green: #16a34a;
      --green-soft: #dcfce7;
      --yellow: #ca8a04;
      --yellow-soft: #fef3c7;
      --danger: #dc2626;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.18);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    body { overflow: hidden; }
    #map { position: fixed; inset: 0; }

    .topbar {
      position: fixed;
      top: 12px; left: 12px; right: 12px;
      z-index: 1000;
      display: grid;
      gap: 10px;
      padding: 14px;
      border-radius: 22px;
      background: rgba(15, 23, 42, 0.9);
      color: white;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .title { font-size: 18px; font-weight: 800; line-height: 1.1; }
    .subtitle { font-size: 13px; color: rgba(255,255,255,0.82); }

    .searchRow { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
    .searchWrap { display: grid; grid-template-columns: 1fr auto; gap: 8px; background: rgba(255,255,255,0.96); border-radius: 16px; padding: 8px; }
    input { width: 100%; border: 0; outline: none; background: transparent; color: var(--text); font-size: 15px; padding: 8px 6px; }
    button { border: 0; border-radius: 14px; padding: 11px 14px; font-size: 14px; font-weight: 700; cursor: pointer; background: white; color: var(--text); }
    .btn-primary { background: var(--blue); color: white; }
    .btn-soft { background: rgba(255,255,255,0.16); color: white; }
    .btn-small { padding: 9px 12px; }

    .fabStack { position: fixed; right: 12px; bottom: 220px; z-index: 1000; display: grid; gap: 10px; }
    .fab { width: 52px; height: 52px; border-radius: 999px; box-shadow: var(--shadow); background: white; color: var(--text); display: grid; place-items: center; font-size: 20px; }

    .sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 1000; padding: 10px 10px 16px; background: linear-gradient(to top, rgba(226,232,240,1), rgba(226,232,240,0.88) 70%, rgba(226,232,240,0)); pointer-events: none; }
    .sheetCard { pointer-events: auto; background: var(--card); border-radius: 24px; box-shadow: var(--shadow); padding: 14px; max-height: 52vh; overflow: auto; transition: max-height 0.22s ease; }
    .sheetCard.collapsed { max-height: 92px; overflow: hidden; }
    .grabber { width: 44px; height: 5px; border-radius: 999px; background: #cbd5e1; margin: 0 auto 12px; cursor: pointer; }

    .sheetHeaderRow { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 8px; }
    .sheetToggle { border: 1px solid #e2e8f0; background: #f8fafc; color: var(--text); padding: 8px 10px; border-radius: 12px; font-size: 12px; font-weight: 800; }
    .sheetBody.hiddenBody { display: none; }

    .sectionTitle { display: flex; justify-content: space-between; gap: 12px; align-items: start; margin-bottom: 8px; }
    .sectionTitle h2 { margin: 0; font-size: 20px; line-height: 1.1; }
    .pill { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 999px; font-size: 12px; font-weight: 800; }
    .pill-blue { background: var(--blue-soft); color: #1d4ed8; }
    .pill-green { background: var(--green-soft); color: #166534; }
    .pill-yellow { background: var(--yellow-soft); color: #92400e; }
    .pill-gray { background: #e2e8f0; color: #334155; }

    .muted { color: var(--muted); font-size: 14px; line-height: 1.35; }
    .infoGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0; }
    .miniCard { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 10px; }
    .miniLabel { color: var(--muted); font-size: 12px; margin-bottom: 4px; }
    .miniValue { font-size: 14px; font-weight: 700; }

    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
    .notice { margin-top: 10px; padding: 10px 12px; border-radius: 14px; background: #f8fafc; border: 1px solid #e2e8f0; font-size: 13px; color: var(--muted); }
    .planCard { margin-top: 12px; border: 1px solid #e2e8f0; border-radius: 16px; background: #f8fafc; padding: 12px; }
    .savedBanner { margin-top: 12px; padding: 10px 12px; border-radius: 14px; background: var(--green-soft); color: #166534; font-size: 13px; font-weight: 700; display: none; }

    @media (min-width: 900px) {
      .topbar { left: 16px; right: auto; width: 430px; }
      .sheet { right: 16px; left: auto; width: 430px; background: none; padding: 0; bottom: 16px; }
      .sheetCard { max-height: 72vh; }
      .fabStack { right: 460px; bottom: 24px; }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="topbar">
    <div>
      <div class="title">Milano Parcheggi ATM</div>
      <div class="subtitle">Dati aggiornati a Nov 2023. Cerca via o Codice Area (es. 0123).</div>
    </div>
    <div class="searchRow">
      <div class="searchWrap">
        <input id="searchInput" placeholder="Via o Codice Area (4 cifre)..." />
        <button id="searchBtn" class="btn-primary btn-small">Vai</button>
      </div>
      <button id="locateBtn" class="btn-soft">GPS</button>
    </div>
  </div>

  <div class="fabStack">
    <button id="fitZonesBtn" class="fab" title="Vista Milano">⌂</button>
    <button id="goToCarBtn" class="fab" title="Torna all'auto">🚗</button>
  </div>

  <div class="sheet">
    <div id="sheetCard" class="sheetCard">
      <div id="sheetGrabber" class="grabber"></div>
      <div class="sheetHeaderRow">
        <div class="muted" style="font-size:12px; font-weight:700;">Dettaglio Sosta</div>
        <button id="sheetToggleBtn" class="sheetToggle">Riduci</button>
      </div>
      <div id="sheetBody" class="sheetBody">
        <div class="sectionTitle">
          <h2 id="zoneTitle">Seleziona Zona</h2>
          <span id="zoneBadge" class="pill pill-gray">info</span>
        </div>
        <div id="zoneText" class="muted">Tocca una zona colorata o cerca un codice area per vedere tariffe e orari ufficiali.</div>

        <div class="infoGrid">
          <div class="miniCard">
            <div class="miniLabel">Tariffa Oraria</div>
            <div id="parkingPrice" class="miniValue">—</div>
          </div>
          <div class="miniCard">
            <div class="miniLabel">Orari</div>
            <div id="parkingHours" class="miniValue">—</div>
          </div>
        </div>

        <div class="actions">
          <button id="parkBtn" class="btn-primary">Salva Auto</button>
          <button id="studyBtn">Dettagli</button>
        </div>

        <div id="noticeBox" class="notice"></div>
        <div id="planBox" class="planCard hidden"></div>
        <div id="savedBanner" class="savedBanner"></div>
      </div>
    </div>
  </div>

<script>
  const map = L.map('map', { zoomControl: false }).setView([45.4642, 9.19], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  // DATI ESTRATTI DAI PDF ATM (Nov 2023)
  const areas = [
    {
      id: 'area-c',
      name: 'Area C (Cerchia Bastioni)',
      codes: ["0123", "0323", "0423", "0523", "0623", "0723", "0211", "0911", "1011"],
      price: "€ 3,00/h",
      hours: "08:00 - 19:00",
      badge: "Area C",
      badgeClass: "pill-blue",
      color: "#2563eb",
      center: [45.4642, 9.1916],
      coords: [[45.474, 9.175], [45.474, 9.205], [45.454, 9.205], [45.454, 9.175]], // Poligono demo Area C
      rules: "Tutti i giorni 08:00-19:00: €3,00/ora (Max 2 ore).",
      details: "Dalle 19:00 alle 24:00: €3,00 ogni ora per le prime 2 ore, poi gratuito."
    },
    {
      id: 'filoviaria',
      name: 'Cerchia Filoviaria',
      codes: ["0915", "1415", "1615", "1815", "1915", "2115", "2215"],
      price: "€ 2,00/h",
      hours: "08:00 - 24:00",
      badge: "Filoviaria",
      badgeClass: "pill-green",
      color: "#16a34a",
      center: [45.475, 9.215],
      coords: [[45.485, 9.160], [45.485, 9.230], [45.445, 9.230], [45.445, 9.160]], // Poligono demo Filoviaria
      rules: "Tutti i giorni 08:00-24:00: €2,00/ora.",
      details: "Include codici area come 0915 e 1415."
    },
    {
      id: 'extra-filoviaria',
      name: 'Extra-Filoviaria',
      codes: ["2519", "3019", "3119", "3219", "3319", "3419", "3519", "3619", "4019", "4219", "4319"],
      price: "€ 1,20/h",
      hours: "08:00 - 19:00",
      badge: "Extra-Filo",
      badgeClass: "pill-yellow",
      color: "#ca8a04",
      center: [45.500, 9.200],
      coords: [[45.520, 9.150], [45.520, 9.250], [45.480, 9.250], [45.480, 9.150]], // Poligono demo Extra
      rules: "Giorni feriali 08:00-19:00: €1,20/ora.",
      details: "Tariffa agevolata per le zone esterne alla cerchia filoviaria."
    }
  ];

  const zoneTitle = document.getElementById('zoneTitle');
  const zoneBadge = document.getElementById('zoneBadge');
  const zoneText = document.getElementById('zoneText');
  const parkingPrice = document.getElementById('parkingPrice');
  const parkingHours = document.getElementById('parkingHours');
  const noticeBox = document.getElementById('noticeBox');
  const planBox = document.getElementById('planBox');
  const sheetCard = document.getElementById('sheetCard');
  const searchInput = document.getElementById('searchInput');

  function setSheet(area, mode = 'manual', extra = '') {
    zoneTitle.textContent = area.name;
    zoneBadge.textContent = area.badge;
    zoneBadge.className = `pill ${area.badgeClass}`;
    zoneText.textContent = area.rules;
    parkingPrice.textContent = area.price;
    parkingHours.textContent = area.hours;
    noticeBox.textContent = area.details + (extra ? ' ' + extra : '');
    planBox.classList.add('hidden');
  }

  // LOGICA DI RICERCA (Geografica + Codici ATM)
  async function performSearch() {
    const q = searchInput.value.trim();
    if (!q) return;

    // Se è un codice numerico di 4 cifre
    if (/^\d{4}$/.test(q)) {
      const area = areas.find(a => a.codes.includes(q));
      if (area) {
        setSheet(area, 'manual', `Codice Area ${q} trovato.`);
        map.setView(area.center, 15);
        return;
      }
    }

    // Ricerca indirizzo reale (Nominatim)
    try {
      const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q + ', Milano')}`);
      const data = await resp.json();
      if (data.length > 0) {
        const latlng = [data[0].lat, data[0].lon];
        map.setView(latlng, 16);
        L.marker(latlng).addTo(map).bindPopup(data[0].display_name).openPopup();
      }
    } catch (e) { console.error("Errore ricerca", e); }
  }

  // Inizializzazione zone sulla mappa
  const group = L.featureGroup().addTo(map);
  areas.forEach(area => {
    const poly = L.polygon(area.coords, { color: area.color, fillOpacity: 0.2 }).addTo(group);
    poly.on('click', () => setSheet(area));
  });

  document.getElementById('searchBtn').addEventListener('click', performSearch);
  document.getElementById('fitZonesBtn').addEventListener('click', () => map.fitBounds(group.getBounds()));
  
  // Script di base per lo Sheet
  let collapsed = false;
  document.getElementById('sheetToggleBtn').addEventListener('click', () => {
    collapsed = !collapsed;
    sheetCard.classList.toggle('collapsed', collapsed);
    document.getElementById('sheetBody').classList.toggle('hiddenBody', collapsed);
  });

  // GPS
  document.getElementById('locateBtn').addEventListener('click', () => {
    map.locate({setView: true, maxZoom: 16});
  });
  map.on('locationfound', e => {
    L.circle(e.latlng, e.accuracy).addTo(map);
    L.marker(e.latlng).addTo(map).bindPopup("Sei qui").openPopup();
  });
</script>
</body>
</html>
